<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de EPI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1>Controle de EPI</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Nome ou matrícula...">
                <button id="btnSearch">Buscar</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="hidden">Carregando...</div>
        <div id="messageArea" class="hidden"></div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Setor</th>
                        <th>Turno</th>
                        <th>Início</th>
                    </tr>
                </thead>
                <tbody id="employeeBody"></tbody>
            </table>
        </div>
    </main>

    <!-- MODAL 1: HISTÓRICO -->
    <div id="epiModal" class="modal-overlay hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeEpiModal">&times;</span>
            <h2 id="modalEmployeeName">Detalhes</h2>
            <p id="modalEmployeeInfo"></p>
            <hr>
            <div class="modal-header-actions">
                <h3>Gerenciamento de EPIs</h3>
                <button id="btnOpenFicha" class="btn-primary">+ Registrar Nova Entrega</button>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>EPI</th>
                            <th>Status</th>
                            <th>Entrega</th>
                            <th>Validade</th>
                        </tr>
                    </thead>
                    <tbody id="epiListBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- MODAL 2: FICHA TÉCNICA -->
    <div id="fichaModal" class="modal-overlay hidden">
        <div class="modal-content ficha-paper">
            <span class="close-btn" id="closeFichaModal">&times;</span>
            <div class="ficha-header">
                <h2>FICHA DE ENTREGA DOS EPI’S</h2>
                <p>TERMO DE RESPONSABILIDADE PELA GUARDA E USO</p>
            </div>

            <div class="ficha-form">
                <div class="row">
                    <div class="group flex-2">
                        <label>E.P.I RECEBIDO</label>
                        <input type="text" id="f_epi">
                    </div>
                    <div class="group">
                        <label>DATA RETIRADA</label>
                        <input type="date" id="f_data">
                    </div>
                </div>
                <div class="row">
                    <div class="group">
                        <label>QTDE.</label>
                        <input type="number" id="f_qtde" value="1">
                    </div>
                    <div class="group">
                        <label>MODELO</label>
                        <input type="text" id="f_modelo">
                    </div>
                    <div class="group">
                        <label>C.A.</label>
                        <input type="text" id="f_ca">
                    </div>
                </div>
                <div class="row">
                    <div class="group">
                        <label>DATA DEVOLUÇÃO</label>
                        <input type="date" id="f_devolucao">
                    </div>
                </div>
                <div class="sig-section">
                    <label>ASSINATURA DO FUNCIONÁRIO</label>
                    <canvas id="sig-canvas" width="450" height="120"></canvas>
                    <button id="sig-clearBtn">Limpar</button>
                </div>
                <button id="btnSalvarFicha" class="btn-success">Salvar e Assinar</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
